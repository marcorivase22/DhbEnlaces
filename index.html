<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AT&T México — Links Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@600;900&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#040d14;--panel:#091422;--panel2:#0c1a2e;--border:#0d2540;--glow:#0f5080;
  --cyan:#00d4ff;--cyan2:#006b80;--green:#00ff88;--yellow:#ffcc00;
  --orange:#ff8800;--red:#ff2244;--text:#9abccc;--bright:#d8eef8;--dim:#3a6070;
  --font-mono:'Share Tech Mono',monospace;
  --font-ui:'Barlow Condensed',sans-serif;
  --font-head:'Orbitron',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font-ui);min-height:100vh;}
body::before{content:'';position:fixed;inset:0;z-index:9999;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.05) 3px,rgba(0,0,0,.05) 4px);
  pointer-events:none;}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 24px;
  background:linear-gradient(90deg,#020810,#040f1c,#020810);
  border-bottom:1px solid var(--glow);position:sticky;top:0;z-index:100;}
.logo{font-family:var(--font-head);font-size:1.1rem;font-weight:900;color:var(--cyan);
  text-shadow:0 0 18px rgba(0,212,255,.4);letter-spacing:.2em;}
.logo small{color:var(--dim);font-size:.55em;display:block;letter-spacing:.15em;}
.topbar-right{display:flex;align-items:center;gap:14px;font-family:var(--font-mono);font-size:.68rem;}
.ts{color:var(--cyan);}
.dot{width:8px;height:8px;border-radius:50%;background:var(--green);
  box-shadow:0 0 8px var(--green);animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}

/* FILTERS */
.filters{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:8px 24px;
  background:#070f18;border-bottom:1px solid var(--border);}
.flbl{font-family:var(--font-mono);font-size:.58rem;color:var(--dim);letter-spacing:.1em;}
.fb{padding:3px 12px;border:1px solid var(--border);background:var(--panel);
  color:var(--dim);font-family:var(--font-mono);font-size:.62rem;cursor:pointer;transition:all .15s;}
.fb:hover,.fb.on{border-color:var(--cyan);color:var(--cyan);background:rgba(0,212,255,.05);}
.fsep{width:1px;height:20px;background:var(--border);}

/* MAIN */
.main{padding:16px 24px;display:flex;flex-direction:column;gap:14px;}

/* KPIs */
.kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;}
.kpi{background:var(--panel);border:1px solid var(--border);border-top:2px solid var(--cyan2);
  padding:12px 14px;animation:up .4s ease both;}
@keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.kpi:nth-child(1){animation-delay:.05s}.kpi:nth-child(2){animation-delay:.1s}
.kpi:nth-child(3){animation-delay:.15s}.kpi:nth-child(4){animation-delay:.2s}
.kpi:nth-child(5){animation-delay:.25s}.kpi:nth-child(6){animation-delay:.3s}
.klbl{font-family:var(--font-mono);font-size:.55rem;color:var(--dim);letter-spacing:.1em;margin-bottom:4px;}
.kval{font-family:var(--font-head);font-size:1.5rem;font-weight:900;line-height:1;}
.ksub{font-family:var(--font-mono);font-size:.55rem;margin-top:3px;}

/* PANELS */
.two{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.panel{background:var(--panel);border:1px solid var(--border);padding:14px;}
.ptitle{font-family:var(--font-head);font-size:.65rem;color:var(--cyan);letter-spacing:.2em;
  border-bottom:1px solid var(--border);padding-bottom:8px;margin-bottom:12px;}

/* ZONE CARDS */
.zgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.zcard{background:var(--panel2);border:1px solid var(--border);border-left:3px solid;
  padding:10px 12px;cursor:pointer;transition:border-color .15s;}
.zcard:hover{border-color:var(--cyan)!important;}
.zname{font-family:var(--font-head);font-size:.6rem;letter-spacing:.15em;margin-bottom:4px;}
.zval{font-family:var(--font-head);font-size:1.3rem;font-weight:900;}
.zsub{font-family:var(--font-mono);font-size:.55rem;color:var(--dim);margin-top:2px;}
.zbar{height:3px;margin-top:6px;border-radius:1px;}

/* TOP UTIL */
.uitem{margin-bottom:8px;}
.umeta{display:flex;justify-content:space-between;margin-bottom:2px;}
.uname{font-family:var(--font-mono);font-size:.58rem;color:var(--bright);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:70%;}
.utrack{height:6px;background:rgba(255,255,255,.04);border-radius:1px;overflow:hidden;}
.ufill{height:100%;border-radius:1px;transition:width 1s;}

/* TABLE */
.twrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-family:var(--font-mono);font-size:.64rem;}
thead th{text-align:left;padding:6px 8px;color:var(--dim);letter-spacing:.08em;
  border-bottom:1px solid var(--border);font-weight:400;white-space:nowrap;}
tbody tr{border-bottom:1px solid rgba(255,255,255,.02);transition:background .1s;}
tbody tr:hover{background:rgba(0,212,255,.03);}
td{padding:6px 8px;vertical-align:middle;}

/* CHIPS */
.chip{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;
  font-family:var(--font-head);font-size:.58rem;letter-spacing:.08em;}
.cup{background:rgba(0,255,136,.08);color:var(--green);border:1px solid rgba(0,255,136,.25);}
.cdn{background:rgba(255,34,68,.08);color:var(--red);border:1px solid rgba(255,34,68,.25);}
.cun{background:rgba(150,50,255,.08);color:#cc88ff;border:1px solid rgba(150,50,255,.25);}
.cer{background:rgba(255,136,0,.07);color:var(--orange);border:1px solid rgba(255,136,0,.2);}
.cuk{background:rgba(255,204,0,.06);color:var(--yellow);border:1px solid rgba(255,204,0,.2);}

/* UTIL CHIPS */
.uc{display:inline-block;padding:2px 7px;font-family:var(--font-head);font-size:.68rem;font-weight:700;}
.ug{background:rgba(0,255,136,.08);color:var(--green);border:1px solid rgba(0,255,136,.25);}
.uy{background:rgba(255,204,0,.08);color:var(--yellow);border:1px solid rgba(255,204,0,.25);}
.ur{background:rgba(255,34,68,.08);color:var(--red);border:1px solid rgba(255,34,68,.3);}
.una{color:var(--dim);font-size:.6rem;}

/* MINI BAR */
.mb{width:70px;height:5px;background:rgba(255,255,255,.04);border-radius:1px;
  overflow:hidden;display:inline-block;vertical-align:middle;margin-left:4px;}
.mbf{height:100%;border-radius:1px;}
.mg{background:var(--green)}.my{background:var(--yellow)}.mr{background:var(--red)}

.lag{display:inline-block;padding:1px 5px;font-size:.55rem;
  background:rgba(0,180,255,.06);color:var(--cyan2);border:1px solid rgba(0,180,255,.15);}
.cap100{color:#00a8ff;font-family:var(--font-head);font-size:.6rem;}
.cap10{color:var(--dim);font-family:var(--font-head);font-size:.6rem;}
.zone-tag{display:inline-block;padding:1px 6px;font-size:.55rem;border:1px solid var(--border);}

/* ALERT */
.alert{display:none;background:rgba(255,34,68,.08);border:1px solid rgba(255,34,68,.3);
  border-left:4px solid var(--red);padding:10px 16px;font-family:var(--font-mono);
  font-size:.68rem;color:var(--red);margin-bottom:4px;}
.alert.on{display:block;}
</style>
</head>

// ─────────────────────────────────────────────

let ALL  = RAW.results || [];
let fZ = "ALL", fS = "ALL", fT = "ALL";

// Timestamp
document.getElementById("ts").textContent =
  new Date(RAW.collected_at || Date.now()).toLocaleString('es-MX');

// ── HELPERS ──
const ZC = {CENTRO:'#00a8ff',NORTE:'#ff8800',OCCIDENTE:'#00ff88',
  'SUR-CENTRO':'#ffcc00',SURESTE:'#cc44ff',NOROESTE:'#ff4488',CORE:'#00d4ff'};
const zc = z => ZC[z] || '#3a6070';

function uCls(v){
  if(v===null||v===undefined) return '';
  return v>=61?'ur':v>=45?'uy':'ug';
}
function bCls(v){
  if(v===null||v===undefined) return '';
  return v>=61?'mr':v>=45?'my':'mg';
}
function uVal(v){
  if(v===null||v===undefined) return '<span class="una">N/A</span>';
  return `<span class="uc ${uCls(v)}">${v.toFixed(1)}%</span>
    <div class="mb"><div class="mbf ${bCls(v)}" style="width:${Math.min(v,100)}%"></div></div>`;
}
function sChip(s){
  if(!s) return '<span class="chip cuk">?</span>';
  const u=s.toUpperCase();
  if(u==='UP')          return '<span class="chip cup">● UP</span>';
  if(u==='DOWN')        return '<span class="chip cdn">▼ DOWN</span>';
  if(u==='UNREACHABLE') return '<span class="chip cun">✕ SIN ACCESO</span>';
  if(u==='ERROR')       return '<span class="chip cer">⚠ ERROR</span>';
  return `<span class="chip cuk">${u}</span>`;
}
function opr2status(opr){
  if(!opr) return null;
  return opr.toLowerCase().startsWith('up/') ? 'UP' : 'DOWN';
}
function fmtTs(ts){
  if(!ts) return '—';
  return new Date(ts).toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});
}

// ── FILTERS ──
function setFbGroup(btn, selector){
  btn.closest('.filters').querySelectorAll(selector).forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
}
function fZona(v,b){ fZ=v; setFbGroup(b,"[onclick*='fZona']"); render(); }
function fStatus(v,b){ fS=v; setFbGroup(b,"[onclick*='fStatus']"); render(); }
function fTipo(v,b){ fT=v; setFbGroup(b,"[onclick*='fTipo']"); render(); }

function filtered(){
  return ALL.filter(r=>{
    if(fZ!=='ALL' && r.zona!==fZ) return false;
    if(fS!=='ALL' && r.status!==fS) return false;
    if(fT!=='ALL' && r.tipo!==fT) return false;
    return true;
  });
}

// ── RENDER ──
function render(){
  const d = filtered();
  renderKPIs(d);
  renderZones(d);
  renderTopUtil(d);
  renderTable(d);
  renderAlert(ALL);
}

function renderKPIs(d){
  const up    = d.filter(r=>r.status==='UP').length;
  const dn    = d.filter(r=>r.status==='DOWN').length;
  const unr   = d.filter(r=>r.status==='UNREACHABLE').length;
  const crit  = d.filter(r=>(r.util?.util_out_pct||0)>=61).length;
  const vals  = d.map(r=>r.util?.util_out_pct).filter(v=>v!=null);
  const avg   = vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : 0;
  document.getElementById('kpis').innerHTML = `
    <div class="kpi" style="border-top-color:var(--cyan)">
      <div class="klbl">ENLACES</div><div class="kval" style="color:var(--cyan)">${d.length}</div>
      <div class="ksub" style="color:var(--dim)">monitoreados</div></div>
    <div class="kpi" style="border-top-color:var(--green)">
      <div class="klbl">UP</div><div class="kval" style="color:var(--green)">${up}</div>
      <div class="ksub" style="color:var(--green)">${d.length?((up/d.length)*100).toFixed(0):0}% disponibilidad</div></div>
    <div class="kpi" style="border-top-color:var(--red)">
      <div class="klbl">DOWN</div><div class="kval" style="color:var(--red)">${dn}</div>
      <div class="ksub" style="color:var(--red)">${dn?'⚠ ALERTA':'sin caídas'}</div></div>
    <div class="kpi" style="border-top-color:#cc88ff">
      <div class="klbl">SIN ACCESO</div><div class="kval" style="color:#cc88ff">${unr}</div>
      <div class="ksub" style="color:#cc88ff">unreachable</div></div>
    <div class="kpi" style="border-top-color:var(--red)">
      <div class="klbl">CRÍTICOS &gt;61%</div><div class="kval" style="color:var(--red)">${crit}</div>
      <div class="ksub" style="color:var(--red)">requieren atención</div></div>
    <div class="kpi" style="border-top-color:var(--yellow)">
      <div class="klbl">UTIL PROM OUT</div>
      <div class="kval ${uCls(avg)}" style="font-size:1.3rem">${avg.toFixed(1)}%</div>
      <div class="ksub" style="color:var(--dim)">promedio filtro</div></div>`;
}

function renderZones(d){
  const zs = {};
  for(const r of d){
    const z=r.zona||'CORE';
    if(!zs[z]) zs[z]={t:0,up:0,dn:0,u:[]};
    zs[z].t++;
    if(r.status==='UP') zs[z].up++;
    if(r.status==='DOWN') zs[z].dn++;
    const o=r.util?.util_out_pct;
    if(o!=null) zs[z].u.push(o);
  }
  document.getElementById('zgrid').innerHTML = Object.entries(zs).map(([z,s])=>{
    const avg=s.u.length?s.u.reduce((a,b)=>a+b,0)/s.u.length:0;
    const col=zc(z);
    const bc=avg>=61?'var(--red)':avg>=45?'var(--yellow)':'var(--green)';
    return `<div class="zcard" style="border-left-color:${col}" onclick="fZona('${z}',document.querySelector('[onclick*=\\'${z}\\']'))">
      <div class="zname" style="color:${col}">${z}</div>
      <div class="zval" style="color:${col}">${s.t}</div>
      <div class="zsub">UP:${s.up} · DN:${s.dn} · ${avg.toFixed(1)}%</div>
      <div class="zbar" style="background:linear-gradient(90deg,${bc}44,${bc});width:${Math.min(avg,100)}%"></div>
    </div>`;
  }).join('');
}

function renderTopUtil(d){
  const sorted=[...d].filter(r=>r.util?.util_out_pct!=null)
    .sort((a,b)=>b.util.util_out_pct-a.util.util_out_pct).slice(0,8);
  if(!sorted.length){
    document.getElementById('toputil').innerHTML='<div class="una" style="padding:20px;text-align:center">Sin datos de utilización</div>';
    return;
  }
  document.getElementById('toputil').innerHTML=sorted.map(r=>{
    const v=r.util.util_out_pct;
    return `<div class="uitem">
      <div class="umeta">
        <span class="uname">${r.enlace_a}</span>
        <span class="uc ${uCls(v)}" style="font-size:.65rem">${v.toFixed(1)}%</span>
      </div>
      <div class="utrack"><div class="ufill ${bCls(v)}" style="width:${Math.min(v,100)}%"></div></div>
    </div>`;
  }).join('');
}

function renderTable(d){
  document.getElementById('ttitle').innerHTML=`// ENLACES — DETALLE <span style="color:var(--dim);font-size:.55rem">(${d.length})</span>`;
  document.getElementById('tbody').innerHTML=d.map(r=>{
    const iP=r.util?.util_in_pct, oP=r.util?.util_out_pct;

    const capCls=cap.includes('100')?'cap100':'cap10';
    const lag=r.lag_id?`<span class="lag">LAG-${r.lag_id}</span>`:'<span class="lag" style="color:var(--dim)">PORT</span>';
    const zCol=zc(r.zona);
    const rowBg=r.status==='DOWN'?'background:rgba(255,34,68,.03);':'';
    return `<tr style="${rowBg}">
      <td style="color:var(--dim);font-size:.55rem">${r.id}</td>
      <td><div style="color:var(--bright);font-size:.62rem">${r.enlace_a}</div>
          <div style="color:var(--dim);font-size:.52rem">${r.ip_a||''}</div></td>
      <td>${sChip(r.status)}</td>
      <td style="color:var(--dim)">⇄</td>
      <td><div style="color:var(--text);font-size:.58rem">${r.enlace_b||'—'}</div></td>
      <td>${sChip(bStatus)}</td>
      <td><span class="${capCls}">${cap}</span></td>
      <td>${lag}</td>
      <td>${uVal(iP)}</td>
      <td>${uVal(oP)}</td>
      <td><span class="zone-tag" style="border-color:${zCol}44;color:${zCol}">${r.zona||'—'}</span></td>
      <td style="color:var(--dim);font-size:.55rem">${fmtTs(r.timestamp)}</td>
    </tr>`;
  }).join('');
}

function renderAlert(d){
  const dn=d.filter(r=>r.status==='DOWN');
  const un=d.filter(r=>r.status==='UNREACHABLE');
  const el=document.getElementById('alert');
  let msgs=[];
  if(dn.length) msgs.push(`▼ DOWN (${dn.length}): ${dn.map(r=>r.enlace_a).join(' · ')}`);
  if(un.length) msgs.push(`✕ SIN ACCESO (${un.length}): ${[...new Set(un.map(r=>r.ip_a))].join(' · ')}`);
  if(msgs.length){el.className='alert on';el.innerHTML=msgs.join('<br>');}
  else el.className='alert';
}

// ── INIT ──
render();
</script>
</body>
</html>

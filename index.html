<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AT&T México — Links Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700;800&family=Orbitron:wght@600;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #040d14;
  --bg2:       #070f18;
  --panel:     #091422;
  --panel2:    #0c1a2e;
  --border:    #0d2540;
  --glow:      #0f5080;
  --cyan:      #00d4ff;
  --cyan-dim:  #006b80;
  --green:     #00ff88;
  --green-bg:  rgba(0,255,136,.08);
  --yellow:    #ffcc00;
  --yellow-bg: rgba(255,204,0,.08);
  --orange:    #ff8800;
  --red:       #ff2244;
  --red-bg:    rgba(255,34,68,.08);
  --text:      #9abccc;
  --bright:    #d8eef8;
  --dim:       #3a6070;
  --font-mono: 'Share Tech Mono', monospace;
  --font-ui:   'Barlow Condensed', sans-serif;
  --font-head: 'Orbitron', sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font-ui);min-height:100vh;overflow-x:hidden;}

/* scanlines */
body::before{content:'';position:fixed;inset:0;z-index:9998;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.06) 3px,rgba(0,0,0,.06) 4px);
  pointer-events:none;}

/* ── TOPBAR ── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 24px;
  background:linear-gradient(90deg,#020810 0%,#040f1c 50%,#020810 100%);
  border-bottom:1px solid var(--glow);
  position:sticky;top:0;z-index:100;
}
.logo{font-family:var(--font-head);font-size:1.1rem;font-weight:900;color:var(--cyan);
  text-shadow:0 0 18px rgba(0,212,255,.4);letter-spacing:.2em;}
.logo small{color:var(--dim);font-size:.6em;display:block;letter-spacing:.15em;margin-top:-2px;}
.topbar-right{display:flex;align-items:center;gap:16px;font-family:var(--font-mono);font-size:.68rem;}
.ts-label{color:var(--dim);}
.ts-value{color:var(--cyan);}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--green);
  box-shadow:0 0 8px var(--green);animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.btn-refresh{
  background:rgba(0,212,255,.07);border:1px solid var(--cyan-dim);
  color:var(--cyan);font-family:var(--font-mono);font-size:.65rem;
  padding:4px 12px;cursor:pointer;letter-spacing:.1em;
  transition:all .15s;
}
.btn-refresh:hover{background:rgba(0,212,255,.15);box-shadow:0 0 12px rgba(0,212,255,.2);}

/* ── FILTERS ── */
.filters{
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;
  padding:8px 24px;background:var(--bg2);border-bottom:1px solid var(--border);
}
.flabel{font-family:var(--font-mono);font-size:.58rem;color:var(--dim);letter-spacing:.12em;}
.fbtn{
  padding:3px 12px;border:1px solid var(--border);background:var(--panel);
  color:var(--dim);font-family:var(--font-mono);font-size:.62rem;cursor:pointer;
  transition:all .15s;
}
.fbtn:hover,.fbtn.active{
  border-color:var(--cyan);color:var(--cyan);background:rgba(0,212,255,.05);
}
.fsep{width:1px;height:20px;background:var(--border);}

/* ── MAIN ── */
.main{padding:16px 24px;display:flex;flex-direction:column;gap:16px;}

/* ── KPI ROW ── */
.kpi-row{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;}
.kpi{
  background:var(--panel);border:1px solid var(--border);
  border-top:2px solid var(--cyan-dim);padding:12px 14px;
  animation:fadeUp .4s ease both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.kpi:nth-child(1){animation-delay:.05s}.kpi:nth-child(2){animation-delay:.10s}
.kpi:nth-child(3){animation-delay:.15s}.kpi:nth-child(4){animation-delay:.20s}
.kpi:nth-child(5){animation-delay:.25s}.kpi:nth-child(6){animation-delay:.30s}
.kpi-lbl{font-family:var(--font-mono);font-size:.55rem;color:var(--dim);letter-spacing:.1em;margin-bottom:4px;}
.kpi-val{font-family:var(--font-head);font-size:1.6rem;font-weight:900;line-height:1;}
.kpi-sub{font-family:var(--font-mono);font-size:.55rem;margin-top:3px;}

/* ── TWO COL ── */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;}

/* ── PANEL ── */
.panel{background:var(--panel);border:1px solid var(--border);padding:14px;}
.ptitle{
  font-family:var(--font-head);font-size:.65rem;color:var(--cyan);
  letter-spacing:.2em;border-bottom:1px solid var(--border);
  padding-bottom:8px;margin-bottom:12px;
  display:flex;align-items:center;gap:8px;
}
.ptitle::before{content:'//';color:var(--dim);font-size:.55rem;}

/* ── LINK TABLE ── */
.link-table-wrap{overflow-x:auto;}
table.lt{
  width:100%;border-collapse:collapse;
  font-family:var(--font-mono);font-size:.65rem;
}
table.lt thead th{
  text-align:left;padding:6px 8px;color:var(--dim);
  letter-spacing:.08em;border-bottom:1px solid var(--border);
  white-space:nowrap;font-weight:400;
}
table.lt tbody tr{border-bottom:1px solid rgba(255,255,255,.02);transition:background .1s;}
table.lt tbody tr:hover{background:rgba(0,212,255,.03);}
table.lt td{padding:6px 8px;vertical-align:middle;}

/* status chips */
.chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;
  font-family:var(--font-head);font-size:.6rem;letter-spacing:.08em;}
.chip-up{background:var(--green-bg);color:var(--green);border:1px solid rgba(0,255,136,.25);}
.chip-down{background:var(--red-bg);color:var(--red);border:1px solid rgba(255,34,68,.25);}
.chip-unk{background:rgba(255,204,0,.06);color:var(--yellow);border:1px solid rgba(255,204,0,.2);}
.chip-unreach{background:rgba(150,50,255,.08);color:#cc88ff;border:1px solid rgba(150,50,255,.25);}
.chip-error{background:rgba(255,136,0,.07);color:var(--orange);border:1px solid rgba(255,136,0,.2);}

/* utilization chips */
.uc{display:inline-block;padding:2px 8px;font-family:var(--font-head);font-size:.7rem;font-weight:700;}
.uc-green{background:var(--green-bg);color:var(--green);border:1px solid rgba(0,255,136,.25);}
.uc-yellow{background:var(--yellow-bg);color:var(--yellow);border:1px solid rgba(255,204,0,.25);}
.uc-red{background:var(--red-bg);color:var(--red);border:1px solid rgba(255,34,68,.3);}
.uc-none{color:var(--dim);font-size:.6rem;}

/* mini bar */
.mbar-wrap{width:80px;height:6px;background:rgba(255,255,255,.04);border-radius:1px;overflow:hidden;display:inline-block;vertical-align:middle;}
.mbar-fill{height:100%;border-radius:1px;}
.mb-green{background:var(--green);}
.mb-yellow{background:var(--yellow);}
.mb-red{background:var(--red);}

/* direction arrows */
.dir{font-size:.75rem;color:var(--dim);}

/* zone badge */
.zone{display:inline-block;padding:1px 6px;font-size:.55rem;letter-spacing:.08em;
  border:1px solid var(--border);color:var(--dim);}

/* cap badge */
.cap{font-family:var(--font-head);font-size:.6rem;color:var(--cyan-dim);}
.cap-100{color:#00a8ff;}.cap-10{color:var(--dim);}

/* lag badge */
.lag{display:inline-block;padding:1px 5px;font-size:.55rem;
  background:rgba(0,180,255,.06);color:var(--cyan-dim);
  border:1px solid rgba(0,180,255,.15);}

/* ── ZONE SUMMARY CARDS ── */
.zone-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.zcard{
  background:var(--panel2);border:1px solid var(--border);
  border-left:3px solid;padding:10px 12px;
  cursor:pointer;transition:border-color .15s;
}
.zcard:hover{border-color:var(--cyan)!important;}
.zcard-name{font-family:var(--font-head);font-size:.6rem;letter-spacing:.15em;margin-bottom:4px;}
.zcard-val{font-family:var(--font-head);font-size:1.3rem;font-weight:900;}
.zcard-sub{font-family:var(--font-mono);font-size:.55rem;color:var(--dim);margin-top:2px;}
.zcard-bar{height:3px;margin-top:6px;border-radius:1px;}

/* ── LOADING / ERROR ── */
.loading{text-align:center;padding:60px;font-family:var(--font-mono);color:var(--dim);}
.loading span{color:var(--cyan);animation:blink 1s step-end infinite;}
@keyframes blink{50%{opacity:0}}
.error-msg{color:var(--red);font-family:var(--font-mono);font-size:.7rem;text-align:center;padding:20px;}

/* ── DOWN ALERT BANNER ── */
.alert-banner{
  display:none;
  background:rgba(255,34,68,.08);border:1px solid rgba(255,34,68,.3);
  border-left:4px solid var(--red);
  padding:10px 16px;font-family:var(--font-mono);font-size:.68rem;
  color:var(--red);
}
.alert-banner.visible{display:block;}

/* ── COLOR UTILS ── */
.c-cyan{color:var(--cyan)}.c-green{color:var(--green)}.c-yellow{color:var(--yellow)}
.c-red{color:var(--red)}.c-dim{color:var(--dim)}.c-bright{color:var(--bright)}
</style>
</head>
<body>

<!-- ══ TOPBAR ══ -->
<div class="topbar">
  <div class="logo">
    AT&amp;T MÉXICO
    <small>LINKS DASHBOARD</small>
  </div>
  <div class="topbar-right">
    <span class="ts-label">ACTUALIZADO:</span>
    <span class="ts-value" id="ts-value">—</span>
    <div class="live-dot"></div>
    <button class="btn-refresh" onclick="loadData()">⟳ REFRESH</button>
  </div>
</div>

<!-- ══ FILTERS ══ -->
<div class="filters">
  <span class="flabel">ZONA</span>
  <button class="fbtn active" onclick="setZona('ALL',this)">TODAS</button>
  <button class="fbtn" onclick="setZona('CENTRO',this)">CENTRO</button>
  <button class="fbtn" onclick="setZona('NORTE',this)">NORTE</button>
  <button class="fbtn" onclick="setZona('OCCIDENTE',this)">OCCIDENTE</button>
  <button class="fbtn" onclick="setZona('SUR-CENTRO',this)">SUR-CENTRO</button>
  <button class="fbtn" onclick="setZona('SURESTE',this)">SURESTE</button>
  <button class="fbtn" onclick="setZona('NOROESTE',this)">NOROESTE</button>
  <div class="fsep"></div>
  <span class="flabel">ESTADO</span>
  <button class="fbtn active" onclick="setStatus('ALL',this)">TODOS</button>
  <button class="fbtn" onclick="setStatus('UP',this)">UP</button>
  <button class="fbtn" onclick="setStatus('DOWN',this)">DOWN</button>
  <div class="fsep"></div>
  <span class="flabel">TIPO</span>
  <button class="fbtn active" onclick="setTipo('ALL',this)">LAG+PORT</button>
  <button class="fbtn" onclick="setTipo('LAG',this)">LAG</button>
  <button class="fbtn" onclick="setTipo('PORT',this)">PORT</button>
</div>

<div class="main">
  <!-- ── ALERT BANNER ── -->
  <div class="alert-banner" id="alert-banner"></div>

  <!-- ── KPI ROW ── -->
  <div class="kpi-row" id="kpi-row">
    <div class="loading"><span>●</span> Cargando datos…</div>
  </div>

  <!-- ── ZONES + SUMMARY ── -->
  <div class="two-col">
    <div class="panel">
      <div class="ptitle">RESUMEN POR ZONA</div>
      <div class="zone-grid" id="zone-grid"><div class="loading"><span>●</span></div></div>
    </div>
    <div class="panel">
      <div class="ptitle">UTILIZACIÓN CRÍTICA — TOP ENLACES</div>
      <div id="top-util"><div class="loading"><span>●</span></div></div>
    </div>
  </div>

  <!-- ── MAIN LINK TABLE ── -->
  <div class="panel">
    <div class="ptitle" id="table-title">ENLACES — DETALLE</div>
    <div class="link-table-wrap">
      <table class="lt">
        <thead>
          <tr>
            <th>#</th>
            <th>ENLACE A (ORIGEN)</th>
            <th>STATUS</th>
            <th>↕</th>
            <th>ENLACE B (DESTINO)</th>
            <th>STATUS B</th>
            <th>CAP</th>
            <th>LAG/PORT</th>
            <th>UTIL IN%</th>
            <th>UTIL OUT%</th>
            <th>ZONA</th>
            <th>ACTUALIZADO</th>
          </tr>
        </thead>
        <tbody id="link-tbody"></tbody>
      </table>
    </div>
  </div>
</div><!-- /main -->

<script>
// ─────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────
const GITHUB_USER = 'marcorivase22';
const REPO_NAME   = 'DhbEnlaces';

function getDataUrls() {
  const host = window.location.hostname;
  if (host === 'localhost' || host === '127.0.0.1' || host === '') {
    return ['data/results.json'];
  }
  // GitHub Pages — raw.githubusercontent siempre funciona sin CORS
  return [
    `https://raw.githubusercontent.com/${GITHUB_USER}/${REPO_NAME}/main/data/results.json`,
    `https://${GITHUB_USER}.github.io/${REPO_NAME}/data/results.json`,
  ];
}

let allData = [];
let currentZona   = "ALL";
let currentStatus = "ALL";
let currentTipo   = "ALL";

// ─────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────
function utilClass(v) {
  if (v === null || v === undefined) return "";
  if (v >= 61) return "uc-red";
  if (v >= 45) return "uc-yellow";
  return "uc-green";
}
function barClass(v) {
  if (v === null || v === undefined) return "";
  if (v >= 61) return "mb-red";
  if (v >= 45) return "mb-yellow";
  return "mb-green";
}
function utilVal(v) {
  if (v === null || v === undefined) return `<span class="uc-none">N/A</span>`;
  const cls = utilClass(v);
  const bCls = barClass(v);
  const pct = Math.min(v, 100);
  return `<span class="uc ${cls}">${v.toFixed(1)}%</span>
    <div class="mbar-wrap" style="margin-left:4px">
      <div class="mbar-fill ${bCls}" style="width:${pct}%"></div>
    </div>`;
}
function statusChip(s) {
  if (!s) return `<span class="chip chip-unk">?</span>`;
  const su = s.toUpperCase();
  if (su === "UP")          return `<span class="chip chip-up">● UP</span>`;
  if (su === "DOWN")        return `<span class="chip chip-down">▼ DOWN</span>`;
  if (su === "UNREACHABLE") return `<span class="chip chip-unreach">✕ SIN ACCESO</span>`;
  if (su === "ERROR")       return `<span class="chip chip-error">⚠ ERROR</span>`;
  return `<span class="chip chip-unk">${su}</span>`;
}
function capBadge(cap) {
  if (!cap) return '—';
  const cls = cap.includes("100") ? "cap-100" : "cap-10";
  return `<span class="cap ${cls}">${cap}</span>`;
}
function lagBadge(lag_id, tipo) {
  if (lag_id) return `<span class="lag">LAG-${lag_id}</span>`;
  return `<span class="lag" style="color:var(--dim)">PORT</span>`;
}
function fmtTs(ts) {
  if (!ts) return '—';
  const d = new Date(ts);
  return d.toLocaleTimeString('es-MX', {hour:'2-digit', minute:'2-digit'});
}
function zoneColor(zona) {
  const m = {
    'CENTRO':'#00a8ff','NORTE':'#ff8800','OCCIDENTE':'#00ff88',
    'SUR-CENTRO':'#ffcc00','SURESTE':'#cc44ff','NOROESTE':'#ff4488',
    'CORE':'#00d4ff'
  };
  return m[zona] || '#3a6070';
}

// ─────────────────────────────────────────
// LOAD DATA
// ─────────────────────────────────────────
async function loadData() {
  const urls = getDataUrls();
  let loaded = false;
  for (const url of urls) {
    try {
      const resp = await fetch(url + "?t=" + Date.now());
      if (!resp.ok) continue;
      const json = await resp.json();
      if (!json.results) continue;
      allData = json.results;
      document.getElementById("ts-value").textContent =
        new Date(json.collected_at || Date.now()).toLocaleString('es-MX');
      loaded = true;
      render();
      return;
    } catch(e) {
      continue;
    }
  }
  if (!loaded) loadDemo();
}

function loadDemo() {
  // Datos demo basados en el inventario real (para visualizar antes de la primera corrida)
  allData = [
    {id:1, enlace_a:"To-GUADALAJARA-CA-100G", enlace_b:"To-TOLUCABUENAVISTA-CA-100G",
     ip_a:"10.190.3.50", capacidad:"100G", lag_id:50, tipo:"LAG", zona:"CENTRO",
     status:"UP", timestamp:new Date().toISOString(),
     interface:{adm:"Up", opr:"Up/Up"}, util:{util_in_pct:38.2, util_out_pct:52.1}},
    {id:2, enlace_a:"To-MONTERREY-CA-ATT", enlace_b:"To-TOLUCA-CA-ATT",
     ip_a:"10.190.3.50", capacidad:"100G", lag_id:null, tipo:"PORT", zona:"NORTE",
     status:"UP", timestamp:new Date().toISOString(),
     interface:{adm:"Up", opr:"Up/Up"}, util:{util_in_pct:21.1, util_out_pct:38.7}},
    {id:3, enlace_a:"To-PUEBLA-CA-ATT", enlace_b:"To-TOLUCA-CA-ATT",
     ip_a:"10.190.3.50", capacidad:"100G", lag_id:null, tipo:"PORT", zona:"SUR-CENTRO",
     status:"UP", timestamp:new Date().toISOString(),
     interface:{adm:"Up", opr:"Up/Up"}, util:{util_in_pct:67.4, util_out_pct:71.2}},
    {id:4, enlace_a:"To-TLALNEPANTLA-CAM-100G", enlace_b:"To-TOLUCABUENAVISTA-CAM-100G",
     ip_a:"10.190.3.50", capacidad:"100G", lag_id:14, tipo:"LAG", zona:"CENTRO",
     status:"UP", timestamp:new Date().toISOString(),
     interface:{adm:"Up", opr:"Up/Up"}, util:{util_in_pct:21.2, util_out_pct:39.4}},
  ];
  document.getElementById("ts-value").textContent = "DEMO — Sin datos reales";
  render();
}

// ─────────────────────────────────────────
// FILTERS
// ─────────────────────────────────────────
function setZona(v, btn) {
  currentZona = v;
  btn.closest('.filters').querySelectorAll('.fbtn').forEach(b=>{
    if(b.onclick && b.onclick.toString().includes('setZona')) b.classList.remove('active');
  });
  btn.classList.add('active');
  render();
}
function setStatus(v, btn) {
  currentStatus = v;
  btn.closest('.filters').querySelectorAll('.fbtn').forEach(b=>{
    if(b.onclick && b.onclick.toString().includes('setStatus')) b.classList.remove('active');
  });
  btn.classList.add('active');
  render();
}
function setTipo(v, btn) {
  currentTipo = v;
  btn.closest('.filters').querySelectorAll('.fbtn').forEach(b=>{
    if(b.onclick && b.onclick.toString().includes('setTipo')) b.classList.remove('active');
  });
  btn.classList.add('active');
  render();
}

function filtered() {
  return allData.filter(r => {
    if (currentZona !== "ALL" && r.zona !== currentZona) return false;
    if (currentStatus !== "ALL" && r.status !== currentStatus) return false;
    if (currentTipo !== "ALL" && r.tipo !== currentTipo) return false;
    return true;
  });
}

// ─────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────
function render() {
  const data = filtered();
  renderKPIs(data);
  renderZones(data);
  renderTopUtil(data);
  renderTable(data);
  renderAlertBanner(allData);
}

function renderKPIs(data) {
  const total = data.length;
  const up    = data.filter(r=>r.status==="UP").length;
  const down  = data.filter(r=>r.status==="DOWN").length;
  const err   = data.filter(r=>!["UP","DOWN"].includes(r.status)).length;
  const crit  = data.filter(r=>{
    const o = r.util?.util_out_pct;
    return o && o >= 61;
  }).length;
  const avg   = data.reduce((s,r)=>{
    const o = r.util?.util_out_pct;
    return o ? s+o : s;
  }, 0) / (data.filter(r=>r.util?.util_out_pct).length || 1);

  document.getElementById("kpi-row").innerHTML = `
    <div class="kpi" style="border-top-color:var(--cyan)">
      <div class="kpi-lbl">ENLACES MONITOREADOS</div>
      <div class="kpi-val c-cyan">${total}</div>
      <div class="kpi-sub c-dim">inventario activo</div>
    </div>
    <div class="kpi" style="border-top-color:var(--green)">
      <div class="kpi-lbl">ENLACE UP</div>
      <div class="kpi-val c-green">${up}</div>
      <div class="kpi-sub c-green">${total?((up/total)*100).toFixed(0):0}% disponibilidad</div>
    </div>
    <div class="kpi" style="border-top-color:var(--red)">
      <div class="kpi-lbl">ENLACE DOWN</div>
      <div class="kpi-val c-red">${down}</div>
      <div class="kpi-sub c-red">${down>0?'⚠ ALERTA ACTIVA':'sin caídas'}</div>
    </div>
    <div class="kpi" style="border-top-color:#cc88ff">
      <div class="kpi-lbl">SIN ACCESO ROUTER</div>
      <div class="kpi-val" style="color:#cc88ff">${unreachable}</div>
      <div class="kpi-sub" style="color:#cc88ff">no se pudo conectar</div>
    </div>
    <div class="kpi" style="border-top-color:var(--red)">
      <div class="kpi-lbl">CRÍTICOS (>61%)</div>
      <div class="kpi-val c-red">${crit}</div>
      <div class="kpi-sub c-red">requieren atención</div>
    </div>
    <div class="kpi" style="border-top-color:var(--yellow)">
      <div class="kpi-lbl">UTIL. PROM. OUT</div>
      <div class="kpi-val ${utilClass(avg)}" style="font-size:1.4rem">${avg.toFixed(1)}%</div>
      <div class="kpi-sub c-dim">promedio del filtro</div>
    </div>
  `;
}

function renderZones(data) {
  const zones = {};
  for (const r of data) {
    const z = r.zona || "CORE";
    if (!zones[z]) zones[z] = {total:0, up:0, down:0, util:[]};
    zones[z].total++;
    if (r.status === "UP") zones[z].up++;
    if (r.status === "DOWN") zones[z].down++;
    const o = r.util?.util_out_pct;
    if (o != null) zones[z].util.push(o);
  }

  document.getElementById("zone-grid").innerHTML = Object.entries(zones).map(([zona, s])=>{
    const avgU = s.util.length ? (s.util.reduce((a,b)=>a+b,0)/s.util.length) : 0;
    const color = zoneColor(zona);
    const pctBar = Math.min(avgU, 100);
    const barC = avgU >= 61 ? 'var(--red)' : avgU >= 45 ? 'var(--yellow)' : 'var(--green)';
    return `
      <div class="zcard" style="border-left-color:${color}" onclick="filterByZone('${zona}')">
        <div class="zcard-name" style="color:${color}">${zona}</div>
        <div class="zcard-val" style="color:${color}">${s.total}</div>
        <div class="zcard-sub">UP: ${s.up} · DOWN: ${s.down} · Util: ${avgU.toFixed(1)}%</div>
        <div class="zcard-bar" style="background:linear-gradient(90deg,${barC}44,${barC});width:${pctBar}%"></div>
      </div>`;
  }).join('');
}

function filterByZone(zona) {
  currentZona = zona;
  // Actualizar botón
  document.querySelectorAll('.fbtn').forEach(b=>{
    if(b.onclick && b.onclick.toString().includes('setZona')) {
      b.classList.toggle('active', b.textContent.trim() === zona || (zona === 'ALL' && b.textContent === 'TODAS'));
    }
  });
  render();
}

function renderTopUtil(data) {
  const sorted = [...data]
    .filter(r => r.util?.util_out_pct != null)
    .sort((a,b) => (b.util.util_out_pct||0) - (a.util.util_out_pct||0))
    .slice(0, 8);

  if (!sorted.length) {
    document.getElementById("top-util").innerHTML = '<div class="c-dim" style="font-family:var(--font-mono);font-size:.65rem;padding:20px;text-align:center">Sin datos de utilización</div>';
    return;
  }

  document.getElementById("top-util").innerHTML = sorted.map(r => {
    const out = r.util.util_out_pct;
    const cls = barClass(out);
    const pct = Math.min(out, 100);
    return `
      <div style="margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;margin-bottom:2px">
          <span style="font-family:var(--font-mono);font-size:.58rem;color:var(--bright);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:65%">${r.enlace_a}</span>
          <span class="uc ${utilClass(out)}" style="font-size:.65rem">${out.toFixed(1)}%</span>
        </div>
        <div style="height:6px;background:rgba(255,255,255,.04);border-radius:1px;overflow:hidden">
          <div class="mbar-fill ${cls}" style="width:${pct}%;height:100%;transition:width 1s"></div>
        </div>
      </div>`;
  }).join('');
}

function renderTable(data) {
  document.getElementById("table-title").innerHTML =
    `// ENLACES — DETALLE <span style="color:var(--dim);font-size:.55rem">(${data.length} resultado(s))</span>`;

  if (!data.length) {
    document.getElementById("link-tbody").innerHTML =
      `<tr><td colspan="12" class="loading" style="padding:30px">Sin resultados para el filtro activo</td></tr>`;
    return;
  }

  document.getElementById("link-tbody").innerHTML = data.map(r => {
    const inPct  = r.util?.util_in_pct;
    const outPct = r.util?.util_out_pct;
    const zColor = zoneColor(r.zona);
    const rowBg  = r.status === "DOWN" ? "background:rgba(255,34,68,.04);" : "";

    return `<tr style="${rowBg}">
      <td class="c-dim" style="font-size:.55rem">${r.id}</td>
      <td>
        <div style="color:var(--bright);font-family:var(--font-mono);font-size:.62rem">${r.enlace_a}</div>
        <div style="color:var(--dim);font-size:.55rem;margin-top:1px">${r.ip_a||''}</div>
      </td>
      <td>${statusChip(r.status)}</td>
      <td class="dir">⇄</td>
      <td>
        <div style="color:var(--text);font-family:var(--font-mono);font-size:.58rem">${r.enlace_b||'—'}</div>
        <div style="color:var(--dim);font-size:.52rem;margin-top:1px">${r.ip_b||''}</div>
      </td>
      <td>${statusChip(r.interface?.opr ? (r.interface.opr.toLowerCase().includes('up') ? 'UP' : 'DOWN') : null)}</td>
      <td>${capBadge(r.capacidad)}</td>
      <td>${lagBadge(r.lag_id, r.tipo)}</td>
      <td>${utilVal(inPct)}</td>
      <td>${utilVal(outPct)}</td>
      <td><span class="zone" style="border-color:${zColor}44;color:${zColor}">${r.zona||'—'}</span></td>
      <td style="color:var(--dim);font-size:.55rem">${fmtTs(r.timestamp)}</td>
    </tr>`;
  }).join('');
}

function renderAlertBanner(data) {
  const banner = document.getElementById("alert-banner");
  const downs       = data.filter(r => r.status === "DOWN");
  const unreachable = data.filter(r => r.status === "UNREACHABLE");
  const errors      = data.filter(r => r.status === "ERROR");

  let msgs = [];
  if (downs.length)
    msgs.push(`▼ ENLACES DOWN (${downs.length}): ${downs.map(r=>r.enlace_a).join(' · ')}`);
  if (unreachable.length)
    msgs.push(`✕ SIN ACCESO AL ROUTER (${unreachable.length}): ${[...new Set(unreachable.map(r=>r.ip_a))].join(' · ')}`);
  if (errors.length)
    msgs.push(`⚠ ERRORES (${errors.length}): ${errors.map(r=>r.enlace_a).join(' · ')}`);

  if (msgs.length) {
    banner.className = "alert-banner visible";
    banner.innerHTML = msgs.join('<br>');
  } else {
    banner.className = "alert-banner";
  }
}

// ─────────────────────────────────────────
// INIT
// ─────────────────────────────────────────
loadData();
// Auto-refresh cada 5 minutos
setInterval(loadData, 5 * 60 * 1000);
</script>
